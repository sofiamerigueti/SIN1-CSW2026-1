<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>servicos</title>
</head>
<body>
   
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      color: #2c3e50;
      text-align: center;
    }

    table {
      width: 90%;
      max-width: 800px;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    thead {
      background: #4CAF50;
      color: white;
    }

    th, td {
      padding: 15px;
      text-align: center;
    }

    tbody tr {
      transition: 0.3s;
    }

    tbody tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tbody tr:hover {
      background-color: #e8f5e9;
      transform: scale(1.01);
    }

    .preco {
      font-weight: bold;
      color: #1e3d59;
    }

    /* Responsivo */
    @media (max-width: 600px) {
      table {
        font-size: 14px;
      }

      th, td {
        padding: 10px;
      }
    }
  </style>
</head>

<body>

  <h1>Tabela de Preços de Serviços</h1>

  <table>
    <thead>
      <tr>
        <th>Serviço</th>
        <th>Descrição</th>
        <th>Preço</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Desenvolver página estática</td>
        <td>HTML e CSS</td>
        <td class="preco">R$ 120,00</td>
      </tr>

      <tr>
        <td>Página dinâmica</td>
        <td>JavaScript / backend</td>
        <td class="preco">R$ 150,00</td>
      </tr>

      <tr>
        <td>Desenvolvimento avançado</td>
        <td>Sistemas completos</td>
        <td class="preco">R$ 200,00</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
